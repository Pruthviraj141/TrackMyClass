<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Face Recognition Attendance</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        :root {
            --login-bg: #050505;
            --login-card: #0c0d12;
        }

        body {
            background-color: var(--login-bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(79, 140, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(167, 139, 250, 0.05) 0%, transparent 40%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: formAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes formAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--login-card);
            border: 1px solid #1e2230;
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border-radius: var(--radius-lg);
            z-index: -1;
            opacity: 0.15;
            filter: blur(8px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .login-logo {
            width: 56px;
            height: 56px;
            background: var(--gradient-primary);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 16px rgba(79, 140, 255, 0.2);
        }

        .login-title {
            font-size: 24px;
            font-weight: 710;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Tab Switcher */
        .tab-switcher {
            display: flex;
            background: #141721;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 28px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .tab-btn.active {
            background: var(--gradient-primary);
            color: #fff;
            box-shadow: 0 2px 10px rgba(79, 140, 255, 0.3);
        }

        .tab-btn:not(.active):hover {
            color: var(--text-secondary);
        }

        /* Forms */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: formAppear 0.3s ease;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }

        .login-input {
            width: 100%;
            background: #141721;
            border: 1px solid #232838;
            border-radius: var(--radius-sm);
            padding: 14px 14px 14px 44px;
            color: #fff;
            font-size: 15px;
            transition: var(--transition);
            box-sizing: border-box;
        }

        .login-input:focus {
            border-color: var(--accent-blue);
            background: #1a1e2b;
            box-shadow: 0 0 0 4px var(--accent-blue-dim);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-sm);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(79, 140, 255, 0.2);
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 140, 255, 0.3);
        }

        .btn-login.student-btn {
            background: var(--gradient-success);
            box-shadow: 0 4px 15px rgba(52, 211, 153, 0.2);
        }

        .btn-login.student-btn:hover {
            box-shadow: 0 8px 25px rgba(52, 211, 153, 0.3);
        }

        .error-alert {
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            color: var(--accent-red);
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--text-secondary);
        }

        .create-account-link {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .create-account-link a {
            color: var(--accent-green);
            text-decoration: none;
            font-weight: 600;
        }

        .create-account-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">🎯</div>
                <h2 class="login-title">Welcome Back</h2>
                <p class="login-subtitle">Sign in to your account</p>
            </div>

            {% if error %}
            <div class="error-alert">
                ⚠️ {{ error }}
            </div>
            {% endif %}

            <!-- Tab Switcher -->
            <div class="tab-switcher">
                <button class="tab-btn {{ 'active' if not tab or tab == 'admin' }}" onclick="switchTab('admin')"
                    id="tabAdmin">🔐 Admin</button>
                <button class="tab-btn {{ 'active' if tab == 'student' }}" onclick="switchTab('student')"
                    id="tabStudent">🎓 Student</button>
            </div>

            <!-- Admin Login Form -->
            <div class="tab-content {{ 'active' if not tab or tab == 'admin' }}" id="adminForm">
                <form action="/login" method="POST">
                    <input type="hidden" name="login_type" value="admin">

                    <div class="form-group">
                        <label class="form-label" for="admin-username">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="admin-username" name="username" class="login-input"
                                placeholder="admin" required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="admin-password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔑</span>
                            <input type="password" id="admin-password" name="password" class="login-input"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        Sign In as Admin
                    </button>
                </form>
            </div>

            <!-- Student Login Form -->
            <div class="tab-content {{ 'active' if tab == 'student' }}" id="studentForm">
                <form action="/login" method="POST">
                    <input type="hidden" name="login_type" value="student">

                    <div class="form-group">
                        <label class="form-label" for="student-roll">Roll Number</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🎓</span>
                            <input type="text" id="student-roll" name="roll_number" class="login-input"
                                placeholder="e.g. CS2024001" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="student-password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔑</span>
                            <input type="password" id="student-password" name="password" class="login-input"
                                placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-login student-btn">
                        Sign In as Student
                    </button>
                </form>

                <div class="create-account-link">
                    Don't have an account? <a href="/">Register with Face Capture →</a>
                </div>
            </div>

            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('adminForm').classList.toggle('active', tab === 'admin');
            document.getElementById('studentForm').classList.toggle('active', tab === 'student');
            document.getElementById('tabAdmin').classList.toggle('active', tab === 'admin');
            document.getElementById('tabStudent').classList.toggle('active', tab === 'student');
        }
    </script>
</body>

</html>
